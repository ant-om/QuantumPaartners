<section class="qp-fan flex flex-col items-center w-full py-4 lg:py-8 px-4 md:px-8 relative z-20">
  <div class="flex items-center justify-center w-full max-w-[90rem]">
    <div #container class="fan-layout flex relative justify-center items-center w-full max-w-[80rem]">
      <div
        *ngFor="let s of stocks; let i = index"
        class="fan-card"
        role="button"
        tabindex="0"
        [attr.aria-label]="s.name + ' (' + s.ticker + ')'"
        (click)="router.navigate(['/stock', s.ticker])"
        (keydown.enter)="router.navigate(['/stock', s.ticker])"
      >
        <div class="fan-card-inner">
          <div *ngIf="!failed.has(i) && s.logo_url" class="fan-logo-chip">
            <img
              [src]="s.logo_url"
              [alt]="s.name"
              class="fan-logo"
              loading="lazy"
              referrerpolicy="no-referrer"
              (error)="onLogoError(i)"
            />
          </div>
          <div *ngIf="failed.has(i) || !s.logo_url" class="fan-monogram">{{ monogram(s) }}</div>

          <div class="fan-caption">
            <div class="fan-ticker">{{ s.ticker }}</div>
            <div class="fan-name">{{ s.name }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="needsPagination" class="flex items-center justify-center gap-4 mt-4 md:mt-6 z-30">
    <button class="fan-arrow" (click)="cycle('left')" aria-label="Previous">
      <svg class="w-4 h-4 md:w-5 md:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <div class="flex items-center gap-2">
      <span
        *ngFor="let s of stocks; let i = index"
        class="fan-dot"
        [class.fan-dot--active]="i === centerIndex"
      ></span>
    </div>
    <button class="fan-arrow" (click)="cycle('right')" aria-label="Next">
      <svg class="w-4 h-4 md:w-5 md:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </button>
  </div>
</section>
