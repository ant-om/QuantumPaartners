<!-- Header: title + navigation arrows -->
<div class="sc-header">
  <div class="sc-header-text">
    <h2 class="sc-title">{{ title }}</h2>
    <p class="sc-subtitle">{{ stocks.length }} stocks tracked by QuantumGPT AI</p>
  </div>
  <div class="sc-nav">
    <button class="sc-nav-btn"
            (click)="scrollPrev()"
            [disabled]="!canScrollPrev"
            aria-label="Previous">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <button class="sc-nav-btn"
            (click)="scrollNext()"
            [disabled]="!canScrollNext"
            aria-label="Next">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 19l7-7-7-7"/>
      </svg>
    </button>
  </div>
</div>

<!-- Embla viewport -->
<div class="sc-embla" #emblaRef>
  <div class="sc-embla-container">
    <div *ngFor="let s of stocks"
         class="sc-slide"
         (click)="router.navigate(['/stock', s.ticker])">
      <div class="sc-card group">
        <img [src]="sectorImage(s.sector)"
             [alt]="s.name"
             class="sc-card-img"
             loading="lazy">
        <div class="sc-card-gradient"></div>
        <div class="sc-card-body">
          <div class="sc-card-title">{{ s.name }}</div>
          <div class="sc-card-meta">{{ s.ticker }} · {{ s.exchange }}</div>
          <div class="sc-card-sector">{{ s.sector }}</div>
          <div class="sc-card-read">
            View analysis
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"
                 class="sc-card-arrow">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Dot indicators -->
<div class="sc-dots">
  <button *ngFor="let s of stocks; let i = index"
          class="sc-dot"
          [class.sc-dot--active]="currentSlide === i"
          (click)="scrollTo(i)"
          [attr.aria-label]="'Go to slide ' + (i + 1)">
  </button>
</div>
